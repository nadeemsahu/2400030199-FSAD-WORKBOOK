version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: DeploymentofFullStackApplicationSkill13-mysql
    environment:
      MYSQL_ROOT_PASSWORD: Tinku@2006
      MYSQL_DATABASE: DeploymentofFullStackApplicationSkill13
      MYSQL_USER: root
      MYSQL_PASSWORD: Tinku@2006
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - DeploymentofFullStackApplicationSkill13-network

  app:
    build: ./backend
    container_name: DeploymentofFullStackApplicationSkill13-app
    ports:
      - "8080:8080"
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: DeploymentofFullStackApplicationSkill13
      MYSQL_USER: root
      MYSQL_PASSWORD: Tinku@2006
    depends_on:
      - db
    networks:
      - DeploymentofFullStackApplicationSkill13-network

volumes:
  mysql_data:

networks:
  DeploymentofFullStackApplicationSkill13-network: